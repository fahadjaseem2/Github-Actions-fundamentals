name: hello workflow

on:
  push:
    branches:
      - main

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Say hello to users
        run: echo "Hello Dosto"

      - name: Say hello using variable
        run: echo "Hello $USER"
  details:
    runs-on: ubuntu-latest

    steps:
      - name: show python version
        run: docker --version && python --version
